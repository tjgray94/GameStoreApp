<div class="container update-game-container">
  <div class="card-header">
    <h1 class="page-title">Update Game</h1>
  </div>
  
  <div class="card-body">
    <form [formGroup]="gameForm" (ngSubmit)="submit()" class="game-form">

      <!-- Name Field -->
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Name</mat-label>
        <input matInput type="text" formControlName="name" />
      </mat-form-field>

      <!-- Image Field -->
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Image</mat-label>
        <input matInput type="text" formControlName="image" readonly placeholder="Choose an image..." />
        <button matSuffix mat-icon-button type="button" (click)="fileInput.click()">
          <mat-icon>attach_file</mat-icon>
        </button>
      </mat-form-field>
      <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" hidden />
      @if(imagePreview) {
        <div class=" mb-3 text-center">
          <img [src]="imagePreview" class="img-preview mat-elevation-z2" alt="Game image preview" />
        </div>
      }

      <!-- Price Field -->
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Price</mat-label>
        <span matPrefix>$&nbsp;</span>
        <input matInput type="number" formControlName="price" step="0.01" />
      </mat-form-field>

      <!-- Release Date Field -->
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Release Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="releaseDate" placeholder="MM/DD/YYYY" />
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <!-- Rating Field -->
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Rating (0-5)</mat-label>
        <input matInput type="number" formControlName="rating" min="0" max="5" step="0.1" />
        <mat-hint>Value can be between 0 and 5 (decimals allowed)</mat-hint>
        @if(game?.rating !== null && ((game?.rating ?? 0) < 0 || (game?.rating ?? 0) > 5)) {
          <mat-error>Rating must be between 0 and 5.</mat-error>
        }
      </mat-form-field>
      
      <!-- Button Group -->
      <div class="d-flex justify-content-between mt-4">
        <button mat-raised-button color="primary" type="submit" [disabled]="gameForm.get('rating')?.value !== null && (gameForm.get('rating')?.value < 0 || gameForm.get('rating')?.value > 5)">
          Update Game
        </button>
        <button mat-stroked-button color="warn" type="button" (click)="goBack()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
